name: validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate repository structure and contracts
        run: scripts/validate.sh
      - name: Smoke install, replace, and uninstall
        run: scripts/smoke-install.sh
      - name: Optional quick_validate when present
        run: |
          if command -v quick_validate.py >/dev/null 2>&1; then
            quick_validate.py skills/goal-workflow
          else
            echo "quick_validate.py not available; skipping"
          fi
      - name: Check whitespace with git diff
        run: git diff --check
